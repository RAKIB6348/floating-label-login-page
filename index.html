<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floating Label Login</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1f2937, #2563eb);
    }

    .login-card {
      width: 360px;
      padding: 32px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
    }

    .login-card h2 {
      margin: 0 0 24px;
      text-align: center;
      color: #111827;
    }

    .form-group {
      position: relative;
      margin-bottom: 22px;
    }

    .form-group input {
      width: 100%;
      padding: 16px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      outline: none;
      font-size: 15px;
      background: transparent;
    }

    .form-group label {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
      background: #ffffff;
      padding: 0 6px;
      transition: 0.2s ease;
      pointer-events: none;
    }

    .form-group input:focus,
    .form-group input:not(:placeholder-shown) {
      border-color: #2563eb;
    }

    .form-group input:focus + label,
    .form-group input:not(:placeholder-shown) + label {
      top: 0;
      font-size: 12px;
      color: #2563eb;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .login-btn:hover {
      background: #1d4ed8;
    }

    .footer-text {
      margin-top: 18px;
      text-align: center;
      font-size: 14px;
      color: #64748b;
    }
  </style>
</head>

<body>
  <div class="login-card">
    <h2>Login</h2>

    <form>
      <div class="form-group">
        <input type="email" id="email" placeholder=" " required />
        <label for="email">Email Address</label>
      </div>

      <div class="form-group">
        <input type="password" id="password" placeholder=" " required />
        <label for="password">Password</label>
      </div>

      <button type="submit" class="login-btn">Sign In</button>
    </form>

    <p class="footer-text">Forgot password?</p>
  </div>
</body>
</html>
